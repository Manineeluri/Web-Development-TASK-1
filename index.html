<!DOCTYPE html>
<html>
<head>
    <title>My First Webpage</title>

    <style>
        /* CSS Styling */

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: darkblue;
        }

        p {
            font-size: 18px;
            color: #333;
        }

        img {
            width: 250px;
            border-radius: 10px;
        }

        a {
            color: green;
            text-decoration: none;
            font-weight: bold;
        }

        button {
            background-color: blue;
            color: white;
            border: none;
            padding: 10px 20px;
            margin-top: 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkblue;
        }
    </style>
</head>

<body>

    <!-- HTML Content -->

    <h1>Welcome to My Webpage</h1>

    <p>This webpage is created using HTML, CSS, and JavaScript.</p>

    <img src="new.jpeg.jpeg" alt="Sample Image">

    <br><br>

    <a href="https://www.google.com" target="_blank">
        Visit Google
    </a>

    <br>

    <!-- JavaScript Button -->

    <button onclick="showMessage()">
        Click Me
    </button>

    <script>
        // JavaScript Function

        function showMessage() {
            alert("Hello! Welcome to Web Development.");
        }
    </script>

</body>
</html>
